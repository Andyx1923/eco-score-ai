<div class="min-h-screen bg-gradient-to-br from-green-100 to-green-300 flex items-center justify-center">

  <div class="bg-white shadow-2xl rounded-2xl p-8 w-full max-w-2xl">

    <h1 class="text-3xl font-bold text-green-700 text-center mb-6">
      🌍 Estado Ambiental UTMACH
    </h1>

    <div *ngIf="!stats" class="text-center">
      Cargando estadísticas...
    </div>

    <div *ngIf="stats">

      <!-- MÉTRICAS -->
      <div class="grid grid-cols-2 gap-4 mb-6">

        <div class="bg-green-50 p-4 rounded">
          <p class="text-sm">Promedio Score</p>
          <p class="text-xl font-bold">{{ stats.promedioScore }}</p>
        </div>

        <div class="bg-green-50 p-4 rounded">
          <p class="text-sm">Usuarios</p>
          <p class="text-xl font-bold">{{ stats.totalUsuarios }}</p>
        </div>

      </div>

      <!-- MENSAJE IA -->
      <div class="bg-yellow-100 p-4 rounded mb-6 text-center">
        {{ stats.mensaje }}
      </div>

     <!-- GRÁFICOS -->
<div *ngIf="stats" class="mt-6 space-y-6">

  <div>
    <h2 class="font-semibold mb-2">🚗 Transporte</h2>
    <canvas id="transporteChart"></canvas>
  </div>

  <div>
    <h2 class="font-semibold mb-2">🧴 Uso de plástico</h2>
    <canvas id="plasticoChart"></canvas>
  </div>

</div>

    </div>

  </div>

</div>
